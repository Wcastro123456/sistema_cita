<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Citas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white text-center">
                        <h4>Agendar Nueva Cita</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="formCita">
                            <div class="mb-3">
                                <label class="form-label">Nombre del Cliente</label>
                                <input type="text" id="cliente" class="form-control" placeholder="Ej. Juan Pérez" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fecha y Hora</label>
                                <input type="datetime-local" id="fecha" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Confirmar Reserva</button>
                        </form>
                        <div id="mensaje" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

      <script>
       
     const agendarCita = async () => {
    // Obtenemos los datos de los inputs del HTML
    const nombreVal = document.getElementById('cliente').value;
    const fechaVal = document.getElementById('fecha').value;

    const datos = {
        nombre: nombreVal,
        fecha: fechaVal
    };

    try {
        const response = await fetch('http://localhost:8080/api/citas', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            // Convertimos el objeto a formato de formulario que entiende tu Java
            body: new URLSearchParams(datos) 
        });

        const resultado = await response.json();
        alert(resultado.message); // Muestra "Cita agendada" o el error
        
    } catch (error) {
        console.error("Error al conectar con el servidor Java:", error);
        alert("El servidor Java en el puerto 8080 no responde");
    }
}
    </script>
</body>
</html>
